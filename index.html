    /* ======================= PRELOADER ======================= */

    @keyframes pulseIcon {
      0% { transform: scale(0.96); opacity: 0.9; text-shadow: 0 0 0 rgba(255,255,255,0.3); }
      100% { transform: scale(1.08); opacity: 1; text-shadow: 0 0 12px rgba(255,255,255,0.5); }

<script>
  // ======================= APENAS PORTUGUÊS (TRADUÇÕES UNIFICADAS) =======================
  const translations = {
    pt: { appTitle: "Chat Seguro P2P", fixedLabel: "Fixo:", disposableLabel: "Descartável:", fixedBtnText: "Fixo", disposableBtnText: "Descartável", modeFixed: "Modo: ID Fixo", modeDisposable: "Modo: Descartável", remotePlaceholder: "ID do amigo (Fixo ou Descartável)", connectBtn: "Conectar", disconnectBtn: "Desconectar", clearChatTitle: "Limpar chat", emojiPickerTitle: "Seletor de emojis", contactsBtnTitle: "Contatos (CRUD)", lastPeerTitle: "Último ID", encryptionNone: "Sem criptografia", encryptionActive: "E2EE Ativo 🔒", keyBtnTitle: "Definir chave", msgPlaceholder: "Digite uma mensagem...", sysInit: "🔒 E2EE pronto. Defina uma frase secreta compartilhada com seu amigo para chats criptografados. 🛡️", sysMobile: "📱 Mobile pronto: Contatos, Emojis, E2EE + ID duplo.", connectedTo: "✅ Conectado a {id}", connectionClosed: "🔌 Conexão encerrada com {id}", disconnectedFrom: "🔓 Desconectado de {id}", timeoutConnect: "⏰ Não foi possível conectar a {id}", failedConnect: "❌ Falha ao conectar a {id}", encryptEnabled: "🔒 Criptografia ativada! Certifique-se de que seu amigo use a MESMA frase secreta.", encryptDisabled: "🔓 Criptografia desativada.", encryptFailed: "Falha ao definir chave de criptografia", copySuccess: "✅ ID copiado", copyManual: "Copiar manualmente", fixedUpdated: "ID fixo atualizado para {id}", confirmResetFixed: "Alterar seu ID fixo permanente? Links antigos deixarão de funcionar.", cannotSelf: "Você não pode se conectar a si mesmo 😅", alreadyConnected: "Já conectado. Desconecte primeiro.", enterPeerId: "Digite o ID do amigo", notConnected: "Não conectado", encryptionPrompt: "🔐 Criptografia de ponta a ponta\nDigite uma frase secreta compartilhada (a mesma que seu amigo):\nDeixe em branco para desativar a criptografia.", chatCleared: "🧹 Histórico do chat limpo.", lastPeerLoaded: "Carregado: {id}", noPrevPeer: "Nenhum ID anterior encontrado", fixedCopied: "ID Fixo copiado", activeCopied: "ID ativo copiado", peerNotReady: "Peer não está pronto", initFailed: "Falha na inicialização", switchModeDisconnect: "Desconecte antes de trocar o modo de ID.", plaintextSendWarn: "⚠️ Enviando sem criptografia (ativar E2EE recomendado)", plaintextReceiveWarn: "⚠️ Mensagem recebida em texto simples enquanto a criptografia está ativa. Defina a mesma frase secreta.", typingFriend: "Amigo está digitando...", emojiPickerHeader: "Escolha um emoji", copyIdTitle: "Copiar meu ID ativo", copyFixedTitle: "Copiar ID fixo", resetFixedTitle: "Gerar novo ID fixo", modalTitle: "Contatos", addUpdateBtn: "➕ Adicionar / Atualizar", noContacts: "✨ Nenhum contato ainda. Adicione um acima.", connectContact: "Conectar", editContact: "Editar", deleteContact: "Excluir", contactSaved: "Contato salvo", contactDeleted: "Contato excluído", contactNamePlaceholder: "Nome do contato", contactIdPlaceholder: "ID do amigo" }
  };
  let currentLang = 'pt';
  function t(key, params = {}) { let str = translations.pt[key] || translations.pt[key] || key; Object.keys(params).forEach(k => str = str.replace(`{${k}}`, params[k])); return str; }
  
  // ======================= PRELOADER =======================
  let preloaderHidden = false;
  function hidePreloader() {
    if (preloaderHidden) return;
    preloaderHidden = true;
    const preloader = document.getElementById('preloader');
    if (preloader) {
      preloader.style.opacity = '0';
      setTimeout(() => {
        preloader.style.display = 'none';
      }, 600);
    }
  }
  // Fallback: esconde preloader após 5s mesmo se algo falhar
  setTimeout(() => { if (!preloaderHidden) hidePreloader(); }, 5000);
  
  // ======================= CONTATOS (CRUD) =======================
  let contacts = [];
  const CONTACTS_STORAGE = "p2p_contacts";
  function loadContacts() { const stored = localStorage.getItem(CONTACTS_STORAGE); contacts = stored ? JSON.parse(stored) : []; }
  function saveContacts() { localStorage.setItem(CONTACTS_STORAGE, JSON.stringify(contacts)); }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  function renderContactsList() {
    const container = document.getElementById('contactsList');
    if (!container) return;
    if (contacts.length === 0) { container.innerHTML = `<div class="system-message">✨ ${t('noContacts')}</div>`; return; }
    container.innerHTML = '';
    contacts.forEach(contact => {
      const div = document.createElement('div'); div.className = 'contact-item';
      div.innerHTML = `<div class="contact-info"><div class="contact-name">${escapeHtml(contact.name)}</div><div class="contact-id">${escapeHtml(contact.peerId)}</div></div><div class="contact-actions"><button class="connect-contact" data-id="${contact.id}" data-peerid="${escapeHtml(contact.peerId)}" title="${t('connectContact')}"><i class="fas fa-plug"></i></button><button class="edit-contact" data-id="${contact.id}" title="${t('editContact')}"><i class="fas fa-edit"></i></button><button class="delete-contact" data-id="${contact.id}" title="${t('deleteContact')}"><i class="fas fa-trash"></i></button></div>`;
      container.appendChild(div);
    });
    document.querySelectorAll('.connect-contact').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const peerId = btn.getAttribute('data-peerid'); if (peerId) { document.getElementById('remotePeerId').value = peerId; closeContactsModal(); showToast(`🔗 ${t('connectContact')}: ${peerId}`); connectToPeer(peerId); } }));
    document.querySelectorAll('.edit-contact').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); const contact = contacts.find(c => c.id == id); if (contact) { document.getElementById('contactNameInput').value = contact.name; document.getElementById('contactIdInput').value = contact.peerId; document.getElementById('editingContactId').value = contact.id; document.getElementById('saveContactBtn').innerHTML = t('addUpdateBtn'); } }));
    document.querySelectorAll('.delete-contact').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); if (confirm(`Excluir ${t('deleteContact')}?`)) { contacts = contacts.filter(c => c.id != id); saveContacts(); renderContactsList(); showToast(t('contactDeleted')); } }));
  }
  function openContactsModal() { document.getElementById('contactsModal').style.display = 'flex'; renderContactsList(); }
  function closeContactsModal() { document.getElementById('contactsModal').style.display = 'none'; document.getElementById('contactNameInput').value = ''; document.getElementById('contactIdInput').value = ''; document.getElementById('editingContactId').value = ''; document.getElementById('saveContactBtn').innerHTML = t('addUpdateBtn'); }
  function handleSaveContact() { 
    const name = document.getElementById('contactNameInput').value.trim(); 
    const peerId = document.getElementById('contactIdInput').value.trim(); 
    if (!name || !peerId) { showToast("Nome e ID são obrigatórios"); return; } 
    const editId = document.getElementById('editingContactId').value; 
    if (editId) { 
      const index = contacts.findIndex(c => c.id == editId); 
      if (index !== -1) { contacts[index].name = name; contacts[index].peerId = peerId; } 
    } else { 
      contacts.push({ id: Date.now().toString(), name: name, peerId: peerId }); 
    } 
    saveContacts(); 
    renderContactsList(); 
    document.getElementById('contactNameInput').value = ''; 
    document.getElementById('contactIdInput').value = ''; 
    document.getElementById('editingContactId').value = ''; 
    document.getElementById('saveContactBtn').innerHTML = t('addUpdateBtn');
    showToast(t('contactSaved')); 
  }
  
  // ======================= CRIPTOGRAFIA & PEER =======================
  let encryptionKey = null, encryptionPassphrase = null; const ENC_SALT = "P2PSecureStaticSalt2025!";
  async function deriveKeyFromPassphrase(passphrase) { const encoder = new TextEncoder(); const keyMaterial = await crypto.subtle.importKey("raw", encoder.encode(passphrase), "PBKDF2", false, ["deriveKey"]); const salt = encoder.encode(ENC_SALT); return await crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]); }
  async function encryptMessage(plainText) { if (!encryptionKey) return null; const iv = crypto.getRandomValues(new Uint8Array(12)); const encoder = new TextEncoder(); const encoded = encoder.encode(plainText); const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, encryptionKey, encoded); const combined = new Uint8Array(iv.length + encrypted.byteLength); combined.set(iv); combined.set(new Uint8Array(encrypted), iv.length); return btoa(String.fromCharCode.apply(null, combined)); }
  async function decryptMessage(encryptedBase64) { if (!encryptionKey) return null; try { const binary = atob(encryptedBase64); const combined = new Uint8Array(binary.length); for (let i = 0; i < binary.length; i++) combined[i] = binary.charCodeAt(i); const iv = combined.slice(0, 12); const ciphertext = combined.slice(12); const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, encryptionKey, ciphertext); return new TextDecoder().decode(decrypted); } catch(e) { return null; } }
  async function setEncryption(passphrase) { if (!passphrase || passphrase.trim() === "") { encryptionKey = null; encryptionPassphrase = null; updateEncryptionUI(); return false; } try { encryptionKey = await deriveKeyFromPassphrase(passphrase); encryptionPassphrase = passphrase; updateEncryptionUI(); return true; } catch(e) { showToast(t('encryptFailed')); return false; } }
  function disableEncryption() { encryptionKey = null; encryptionPassphrase = null; updateEncryptionUI(); showToast(t('encryptDisabled')); addSystemMessage(t('encryptDisabled')); }
  function updateEncryptionUI() { const badge = document.getElementById('encryptionStatusBadge'); const span = badge.querySelector('span'); if (encryptionKey) { badge.className = "encrypt-badge"; span.innerText = t('encryptionActive'); badge.style.background = "#1e5a1e"; } else { badge.className = "encrypt-badge plain"; span.innerText = t('encryptionNone'); badge.style.background = "#a16207"; } }
  
  // Emoji picker
  const emojiList = ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚","😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🥸","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","☹️","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🤑","🤠","😈","👿","👹","👺","💀","👻","👽","🤖","💩","😺","😸","😹","😻","😼","😽","🙀","😿","😾","🙈","🙉","🙊","💋","💌","💘","💝","💖","💗","💓","💞","💕","💟","❤️","🧡","💛","💚","💙","💜","🤎","🖤","🤍","💯","❤️‍🔥","💔","❣️","💭","👋","🤚","✋","🖖","👌","🤌","🤏","✌️","🤞","🤟","🤘","🤙","👈","👉","👆","🖕","👇","☝️","👍","👎","✊","👊","🤛","🤜","👏","🙌","👐","🤲","🤝","🙏","✍️","💅","🤳","💪","🦾","🦿","🦵","🦶","👂","🦻","👃","🧠","🦷","🦴","👀","👁️","👅","👄","💋","🫀","🫁","🗣️","👤","👥","🫂","👶","🧒","👦","👧","🧑","👩","🧔","👨","🧓","👴","👵"]; const usedEmojis = emojiList.slice(0, 75);
  function buildEmojiPicker() { const grid = document.getElementById('emojiGrid'); if (!grid) return; grid.innerHTML = ''; usedEmojis.forEach(emoji => { const btn = document.createElement('div'); btn.className = 'emoji-item'; btn.textContent = emoji; btn.addEventListener('click', (e) => { e.stopPropagation(); insertEmojiAtCursor(emoji); closeEmojiPicker(); }); grid.appendChild(btn); }); }
  function insertEmojiAtCursor(emoji) { const input = document.getElementById('messageInput'); if (!input) return; const start = input.selectionStart, end = input.selectionEnd, text = input.value, newText = text.substring(0, start) + emoji + text.substring(end); input.value = newText; input.focus(); input.setSelectionRange(start + emoji.length, start + emoji.length); input.dispatchEvent(new Event('input', { bubbles: true })); }
  function toggleEmojiPicker() { const picker = document.getElementById('emojiPicker'); if (picker.style.display === 'flex') picker.style.display = 'none'; else picker.style.display = 'flex'; }
  function closeEmojiPicker() { document.getElementById('emojiPicker').style.display = 'none'; }
  function handleClickOutsideEmoji(e) { const picker = document.getElementById('emojiPicker'); const btn = document.getElementById('emojiPickerBtn'); if (picker.style.display === 'flex' && !picker.contains(e.target) && e.target !== btn && !btn.contains(e.target)) closeEmojiPicker(); }
  
  // PeerJS connection
  let peer = null, myId = null, dataConnection = null, connectedRemoteId = null, isConnected = false, connectingInProgress = false, currentFixedId = "", currentActiveMode = "disposable";
  const STORAGE_FIXED_ID = "p2p_fixed_permanent_id", STORAGE_LAST_REMOTE = "p2p_last_remote_id";
  function showToast(msg) { let t = document.querySelector('.toast-message'); if (t) t.remove(); let d = document.createElement('div'); d.className = 'toast-message'; d.innerText = msg; document.body.appendChild(d); setTimeout(() => d.remove(), 2500); }
  function addSystemMessage(text) { const div = document.createElement('div'); div.className = 'system-message'; div.innerText = text; document.getElementById('messagesContainer').appendChild(div); scrollToBottom(); }
  function addChatMessage(text, isLocal, timestamp = null) { const wrapper = document.createElement('div'); wrapper.className = `message-bubble ${isLocal ? 'message-right' : 'message-left'}`; const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.innerText = text; const timeSpan = document.createElement('div'); timeSpan.className = 'timestamp'; timeSpan.innerText = timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); wrapper.appendChild(bubble); wrapper.appendChild(timeSpan); document.getElementById('messagesContainer').appendChild(wrapper); scrollToBottom(); }
  function scrollToBottom() { const container = document.getElementById('messagesContainer'); container.scrollTop = container.scrollHeight; document.getElementById('scrollToBottomBtn').style.display = 'none'; }
  function handleScrollVisibility() { const container = document.getElementById('messagesContainer'); const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100; document.getElementById('scrollToBottomBtn').style.display = isNearBottom ? 'none' : 'flex'; }
  function clearChatHistory() { const container = document.getElementById('messagesContainer'); while (container.firstChild) container.removeChild(container.firstChild); addSystemMessage(t('chatCleared')); }
  function saveLastRemoteId(remoteId) { if (remoteId) localStorage.setItem(STORAGE_LAST_REMOTE, remoteId); }
  function loadLastRemoteId() { const saved = localStorage.getItem(STORAGE_LAST_REMOTE); if (saved) document.getElementById('remotePeerId').value = saved; }
  function updateConnectionStatusUI(statusText, isConnectedFlag, remoteId = '') { const badgeSpan = document.querySelector('#connectionStatusBadge span'); const icon = document.querySelector('#connectionStatusBadge i'); if (isConnectedFlag) { badgeSpan.innerText = `Conectado a ${remoteId.slice(0,8)}`; icon.className = 'fas fa-check-circle'; document.querySelector('#connectionStatusBadge').style.background = '#25d366'; } else { if (statusText === 'Connecting...') { badgeSpan.innerText = 'Conectando...'; icon.className = 'fas fa-spinner fa-pulse'; document.querySelector('#connectionStatusBadge').style.background = '#ffc107'; } else { badgeSpan.innerText = t('notConnected'); icon.className = 'fas fa-plug'; document.querySelector('#connectionStatusBadge').style.background = '#cfcfcf'; } } const canSend = isConnectedFlag && dataConnection && dataConnection.open; document.getElementById('messageInput').disabled = !canSend; document.getElementById('sendBtn').disabled = !canSend; }
  let remoteTypingTimeout = null, localTypingTimer = null, isRemoteTyping = false;
  function hideRemoteTyping() { if (remoteTypingTimeout) clearTimeout(remoteTypingTimeout); document.getElementById('typingIndicatorArea').innerHTML = ''; isRemoteTyping = false; }
  function showRemoteTyping() { if (isRemoteTyping) return; isRemoteTyping = true; document.getElementById('typingIndicatorArea').innerHTML = `<div class="typing-indicator"><i class="fas fa-pen-fancy"></i> ${t('typingFriend')}</div>`; scrollToBottom(); if (remoteTypingTimeout) clearTimeout(remoteTypingTimeout); remoteTypingTimeout = setTimeout(() => hideRemoteTyping(), 3000); }
  function sendTypingStatus(isTyping) { if (!isConnected || !dataConnection?.open) return; dataConnection.send({ type: 'typing', typing: isTyping }); }
  function resetConnectionState() { if (dataConnection) { try { dataConnection.close(); } catch(e) {} dataConnection = null; } isConnected = false; connectedRemoteId = null; connectingInProgress = false; updateConnectionStatusUI('Disconnected', false); hideRemoteTyping(); }
  function setupDataConnectionEvents(conn, remotePeerId) { conn.on('open', () => { isConnected = true; connectedRemoteId = remotePeerId; updateConnectionStatusUI('Connected', true, remotePeerId); addSystemMessage(t('connectedTo', { id: remotePeerId })); hideRemoteTyping(); document.getElementById('messageInput').disabled = false; document.getElementById('messageInput').focus(); saveLastRemoteId(remotePeerId); }); conn.on('data', async (data) => { try { if (data.type === 'chat') { let finalText = data.text; if (data.encrypted && encryptionKey) { const decrypted = await decryptMessage(data.text); if (decrypted !== null) finalText = decrypted; else finalText = "🔒 [Falha descriptografia]"; } else if (data.encrypted && !encryptionKey) finalText = "🔒 [Criptografado]"; else if (!data.encrypted && encryptionKey) addSystemMessage(t('plaintextReceiveWarn')); addChatMessage(finalText, false, data.timestamp); } else if (data.type === 'typing') data.typing ? showRemoteTyping() : hideRemoteTyping(); } catch(e) { console.warn(e); } }); conn.on('close', () => { if (isConnected) addSystemMessage(t('connectionClosed', { id: remotePeerId })); resetConnectionState(); }); conn.on('error', (err) => { showToast(`Erro na conexão: ${err.message}`); if (connectingInProgress) { connectingInProgress = false; updateConnectionStatusUI('Disconnected', false); addSystemMessage(t('failedConnect', { id: remotePeerId })); } else resetConnectionState(); }); }
  async function sendMessage() { let text = document.getElementById('messageInput').value.trim(); if (!text) return; if (!isConnected || !dataConnection?.open) { showToast(t('notConnected')); return; } const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); let payload = { type: 'chat', timestamp }; if (encryptionKey) { const encrypted = await encryptMessage(text); if (encrypted) { payload.text = encrypted; payload.encrypted = true; } else { payload.text = text; payload.encrypted = false; } } else { payload.text = text; payload.encrypted = false; if (!encryptionKey) addSystemMessage(t('plaintextSendWarn')); } dataConnection.send(payload); addChatMessage(text, true, timestamp); document.getElementById('messageInput').value = ''; document.getElementById('messageInput').focus(); sendTypingStatus(false); }
  function connectToPeer(remoteId) { if (!peer) { showToast(t('peerNotReady')); return; } if (!remoteId) { showToast(t('enterPeerId')); return; } if (remoteId === myId) { showToast(t('cannotSelf')); return; } if (isConnected) { showToast(t('alreadyConnected')); return; } connectingInProgress = true; updateConnectionStatusUI('Connecting...', false); const conn = peer.connect(remoteId, { reliable: true }); if (!conn) { showToast(t('initFailed')); connectingInProgress = false; updateConnectionStatusUI('Disconnected', false); return; } dataConnection = conn; setupDataConnectionEvents(conn, remoteId); setTimeout(() => { if (connectingInProgress && !isConnected) { connectingInProgress = false; if (!isConnected) { showToast(t('timeoutConnect', { id: remoteId })); resetConnectionState(); addSystemMessage(t('timeoutConnect', { id: remoteId })); if (dataConnection) { try { dataConnection.close(); } catch(e) {} dataConnection = null; } } } }, 12000); }
  function disconnectManual() { if (dataConnection) { const remote = connectedRemoteId; dataConnection.close(); addSystemMessage(t('disconnectedFrom', { id: remote || 'peer' })); resetConnectionState(); } else { resetConnectionState(); showToast(t('notConnected')); } }
  function getOrCreateFixedId() { let stored = localStorage.getItem(STORAGE_FIXED_ID); if (!stored) { stored = "fix-" + Math.random().toString(36).substring(2,12) + "-" + Date.now().toString(36); localStorage.setItem(STORAGE_FIXED_ID, stored); } return stored; }
  function updateFixedIdUI() { document.getElementById('fixedIdDisplay').innerText = currentFixedId; }
  function resetFixedId() { let newFixed = "fix-" + Math.random().toString(36).substring(2,14) + "-" + Date.now().toString(36); localStorage.setItem(STORAGE_FIXED_ID, newFixed); currentFixedId = newFixed; updateFixedIdUI(); showToast(t('fixedUpdated', { id: newFixed.substring(0,12) })); if (currentActiveMode === "fixed" && peer) switchToFixedMode(); }
  async function destroyPeerAndRebuild(useFixedMode) { if (dataConnection) try { dataConnection.close(); } catch(e) {} isConnected = false; connectedRemoteId = null; connectingInProgress = false; if (peer) peer.destroy(); const newId = useFixedMode ? currentFixedId : undefined; currentActiveMode = useFixedMode ? "fixed" : "disposable"; document.getElementById('modeBadgeText').innerText = useFixedMode ? t('modeFixed') : t('modeDisposable'); try { peer = new Peer(newId); peer.on('open', (id) => { myId = id; document.getElementById('myPeerId').innerText = myId; updateConnectionStatusUI('Disconnected', false); addSystemMessage(`🔹 ${useFixedMode ? 'ID Fixo' : 'Modo Descartável'} ativo. Seu ID: ${id}`); document.getElementById('disposableHint').innerHTML = useFixedMode ? "aleatório" : `<strong>${id.substring(0,12)}...</strong>`; if (!preloaderHidden) hidePreloader(); }); peer.on('connection', (conn) => { if (isConnected && dataConnection) disconnectManual(); dataConnection = conn; setupDataConnectionEvents(conn, conn.peer); updateConnectionStatusUI('Connecting...', false); }); peer.on('error', (err) => { let errMsg = err.type === 'peer-unavailable' ? 'Peer offline' : err.message; showToast(errMsg); if (connectingInProgress) { connectingInProgress = false; resetConnectionState(); } if (!preloaderHidden) hidePreloader(); }); peer.on('disconnected', () => { if (isConnected) addSystemMessage("⚠️ Sinalização perdida"); }); } catch(e) { showToast("Falha na inicialização do Peer"); if (!preloaderHidden) hidePreloader(); } }
  function switchToFixedMode() { if (isConnected) { showToast(t('switchModeDisconnect')); return; } destroyPeerAndRebuild(true); }
  function switchToDisposableMode() { if (isConnected) { showToast(t('switchModeDisconnect')); return; } destroyPeerAndRebuild(false); }
  function promptEncryptionKey() { let pass = prompt(t('encryptionPrompt'), encryptionPassphrase || ""); if (pass === null) return; if (pass.trim() === "") { disableEncryption(); } else { setEncryption(pass).then(success => { if (success) addSystemMessage(t('encryptEnabled')); }); } }
  function updateUIForLanguage() { document.querySelector('.chat-title').innerHTML = `<i class="fas fa-shield-alt"></i> ${t('appTitle')}`; document.querySelector('.dual-id-panel .id-badge:first-child .id-label').innerHTML = `<i class="fas fa-lock"></i> ${t('fixedLabel')}`; document.querySelector('.dual-id-panel .id-badge:last-child .id-label').innerHTML = `<i class="fas fa-random"></i> ${t('disposableLabel')}`; document.getElementById('fixedBtnText').innerText = t('fixedBtnText'); document.getElementById('disposableBtnText').innerText = t('disposableBtnText'); document.getElementById('modeBadgeText').innerText = currentActiveMode === 'fixed' ? t('modeFixed') : t('modeDisposable'); document.getElementById('remotePeerId').placeholder = t('remotePlaceholder'); document.getElementById('connectBtnText').innerText = t('connectBtn'); document.getElementById('disconnectBtnText').innerText = t('disconnectBtn'); document.getElementById('messageInput').placeholder = t('msgPlaceholder'); updateEncryptionUI(); document.querySelector('.emoji-picker-header span').innerHTML = `<i class="far fa-smile-wink"></i> ${t('emojiPickerHeader')}`; document.querySelector('.modal-header span').innerHTML = `<i class="fas fa-address-book"></i> ${t('modalTitle')}`; document.getElementById('saveContactBtn').innerHTML = t('addUpdateBtn'); document.getElementById('contactNameInput').placeholder = t('contactNamePlaceholder'); document.getElementById('contactIdInput').placeholder = t('contactIdPlaceholder'); const initialSys = document.getElementById('messagesContainer').querySelector('.system-message'); if (initialSys && initialSys.innerText.includes('E2EE ready')) initialSys.innerHTML = t('sysInit') + ' <i class="fas fa-shield-virus"></i>'; }
  function bindEvents() {
    document.getElementById('connectBtn').onclick = () => { if (isConnected) showToast(t('alreadyConnected')); else { const rid = document.getElementById('remotePeerId').value.trim(); if (!rid) showToast(t('enterPeerId')); else connectToPeer(rid); } };
    document.getElementById('disconnectBtn').onclick = disconnectManual;
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter' && isConnected && dataConnection?.open && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    document.getElementById('messageInput').oninput = () => { if (!isConnected) return; if (localTypingTimer) clearTimeout(localTypingTimer); sendTypingStatus(true); localTypingTimer = setTimeout(() => sendTypingStatus(false), 1800); };
    document.getElementById('messageInput').onblur = () => { if (localTypingTimer) clearTimeout(localTypingTimer); sendTypingStatus(false); };
    document.getElementById('copyIdBtn').onclick = () => { if (myId) navigator.clipboard.writeText(myId).then(() => showToast(t('activeCopied'))).catch(() => showToast(t('copyManual'))); };
    document.getElementById('clearChatBtn').onclick = clearChatHistory;
    document.getElementById('recallLastPeerBtn').onclick = () => { const last = localStorage.getItem(STORAGE_LAST_REMOTE); if (last) { document.getElementById('remotePeerId').value = last; showToast(t('lastPeerLoaded', { id: last })); } else showToast(t('noPrevPeer')); };
    document.getElementById('messagesContainer').onscroll = handleScrollVisibility;
    document.getElementById('scrollToBottomBtn').onclick = scrollToBottom;
    new MutationObserver(handleScrollVisibility).observe(document.getElementById('messagesContainer'), { childList: true, subtree: true });
    document.getElementById('copyFixedIdBtn').onclick = () => { navigator.clipboard.writeText(currentFixedId).then(() => showToast(t('fixedCopied'))).catch(() => showToast(t('copyManual'))); };
    document.getElementById('resetFixedIdBtn').onclick = () => { if (confirm(t('confirmResetFixed'))) resetFixedId(); };
    document.getElementById('switchToFixedBtn').onclick = switchToFixedMode;
    document.getElementById('switchToDisposableBtn').onclick = switchToDisposableMode;
    document.getElementById('setEncryptionBtn').onclick = promptEncryptionKey;
    document.getElementById('encryptionStatusBadge').onclick = promptEncryptionKey;
    document.getElementById('emojiPickerBtn').onclick = (e) => { e.stopPropagation(); toggleEmojiPicker(); };
    document.getElementById('closeEmojiPickerBtn').onclick = closeEmojiPicker;
    document.addEventListener('click', handleClickOutsideEmoji);
    document.getElementById('contactsBtn').onclick = openContactsModal;
    document.getElementById('closeModalBtn').onclick = closeContactsModal;
    document.getElementById('contactsModal').addEventListener('click', (e) => { if (e.target === document.getElementById('contactsModal')) closeContactsModal(); });
    document.getElementById('saveContactBtn').onclick = handleSaveContact;
  }
  function startApp() { currentFixedId = getOrCreateFixedId(); updateFixedIdUI(); currentActiveMode = "disposable"; destroyPeerAndRebuild(false); bindEvents(); buildEmojiPicker(); loadContacts(); document.getElementById('messageInput').disabled = true; document.getElementById('sendBtn').disabled = true; loadLastRemoteId(); updateUIForLanguage(); addSystemMessage(t('sysMobile')); }
  startApp();
</script>
