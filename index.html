<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GreenChat - P2P Messenger Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #e0e2e5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        /* APP CONTAINER - Mobile first */
        .app-container {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        /* SIDEBAR (lista de conversas) - mobile ocupa 100% quando visível */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f9f9fc;
            z-index: 30;
            transform: translateX(-100%);
            transition: transform 0.25s ease-out;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar-header {
            padding: 18px 16px;
            background: #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e4e9ef;
        }
        .sidebar-header h3 {
            color: #075e54;
            font-size: 1.3rem;
            font-weight: 600;
        }
        .sidebar-header .icons i {
            color: #54656f;
            font-size: 1.4rem;
            margin-left: 20px;
            cursor: pointer;
            padding: 8px;
        }
        .search-box {
            padding: 10px 16px;
            background: #ffffff;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #e0e4e8;
            background: #ffffff;
            font-size: 1rem;
        }
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .conv-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            transition: background 0.1s;
        }
        .conv-item:active {
            background: #e8f0e8;
        }
        .conv-avatar {
            width: 52px;
            height: 52px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }
        .conv-info {
            flex: 1;
        }
        .conv-name {
            font-weight: 600;
            color: #111b21;
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
        }
        .conv-last-msg {
            font-size: 0.8rem;
            color: #667781;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-time {
            font-size: 0.7rem;
            color: #8696a0;
        }
        .unread-badge {
            background: #25d366;
            color: #fff;
            border-radius: 20px;
            padding: 3px 9px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        /* CHAT AREA - ocupa toda a tela */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2;
            background-image: radial-gradient(circle at 10% 30%, rgba(200, 200, 200, 0.05) 2%, transparent 2.5%);
            background-size: 28px 28px;
            height: 100%;
        }
        .chat-header {
            background: #f0f2f5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e4e9ef;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .chat-header .back-btn {
            background: none;
            border: none;
            color: #075e54;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            margin-left: -8px;
        }
        .chat-avatar {
            width: 44px;
            height: 44px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: white;
        }
        .chat-contact-info {
            flex: 1;
        }
        .chat-contact-name {
            font-weight: 600;
            color: #111b21;
            font-size: 1rem;
        }
        .chat-status {
            font-size: 0.7rem;
            color: #25d366;
        }
        .chat-actions i {
            color: #54656f;
            font-size: 1.3rem;
            margin-left: 16px;
            padding: 8px;
            cursor: pointer;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
        }
        .message.sent {
            align-self: flex-end;
            background: #d9fdd3;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background: #ffffff;
            border-bottom-left-radius: 4px;
        }
        .msg-content {
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .msg-content img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 14px;
            cursor: pointer;
        }
        .msg-meta {
            font-size: 0.65rem;
            margin-top: 5px;
            text-align: right;
            opacity: 0.7;
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }
        /* Menu de contexto (long press) */
        .context-menu {
            position: fixed;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 8px 0;
            z-index: 200;
            display: none;
            min-width: 150px;
        }
        .context-menu button {
            background: none;
            border: none;
            padding: 12px 20px;
            width: 100%;
            text-align: left;
            font-size: 1rem;
            display: flex;
            gap: 12px;
            align-items: center;
            color: #111;
        }
        .context-menu button:active {
            background: #f0f2f5;
        }
        .input-area {
            background: #f0f2f5;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #e4e9ef;
            position: relative;
        }
        .input-area textarea {
            flex: 1;
            background: #ffffff;
            border: none;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 1rem;
            max-height: 100px;
            font-family: 'Inter', sans-serif;
        }
        .input-area button {
            background: none;
            border: none;
            color: #075e54;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
        }
        .emoji-picker {
            position: absolute;
            bottom: 70px;
            left: 10px;
            right: 10px;
            background: #ffffff;
            border-radius: 28px;
            padding: 14px;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            z-index: 200;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            max-height: 250px;
            overflow-y: auto;
        }
        /* Modais responsivos */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-content {
            background: #ffffff;
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            padding: 24px;
            max-height: 90%;
            overflow-y: auto;
        }
        .avatar-option {
            display: inline-block;
            font-size: 2rem;
            margin: 5px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }
        .avatar-option.selected {
            background: #25d366;
        }
        .flex-btns {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 18px;
        }
        button {
            background: #25d366;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            font-size: 1rem;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        .loading-toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #075e54;
            color: white;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            z-index: 1001;
            display: none;
            font-size: 0.9rem;
        }
        @media (min-width: 701px) {
            .app-container {
                max-width: 1400px;
                height: 95vh;
                border-radius: 28px;
            }
            .sidebar {
                position: relative;
                transform: translateX(0);
                width: 30%;
                height: auto;
                border-radius: 28px 0 0 28px;
            }
            .chat-header .back-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fab fa-whatsapp"></i> GreenChat</h3>
            <div class="icons">
                <i class="fas fa-user-circle" id="profileBtn"></i>
                <i class="fas fa-user-plus" id="newContactBtn"></i>
                <i class="fas fa-cog" id="settingsBtn"></i>
            </div>
        </div>
        <div class="search-box">
            <input type="text" id="searchConv" placeholder="Buscar conversa...">
        </div>
        <div class="conversations-list" id="conversationsList"></div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">
        <div class="chat-header">
            <button class="back-btn" id="backSidebarBtn"><i class="fas fa-arrow-left"></i></button>
            <div class="chat-avatar" id="chatAvatar">👤</div>
            <div class="chat-contact-info">
                <div class="chat-contact-name" id="chatContactName">Selecione uma conversa</div>
                <div class="chat-status" id="chatStatus"><i class="fas fa-circle"></i> Offline</div>
            </div>
            <div class="chat-actions">
                <i class="fas fa-edit" id="editConvNameBtn"></i>
                <i class="fas fa-trash-alt" id="deleteConvBtn"></i>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area" id="inputArea" style="display: none;">
            <button id="emojiBtn"><i class="far fa-smile-wink"></i></button>
            <div class="emoji-picker" id="emojiPicker"></div>
            <textarea id="messageInput" rows="1" placeholder="Digite uma mensagem..."></textarea>
            <button id="sendTextBtn"><i class="fas fa-paper-plane"></i></button>
            <button id="attachFileBtn"><i class="fas fa-paperclip"></i></button>
            <input type="file" id="fileInput" style="display: none;">
        </div>
    </div>
</div>

<!-- MODAIS -->
<div id="profileModal" class="modal"><div class="modal-content"><h3><i class="fas fa-id-card"></i> Meu Perfil</h3><div id="qrcode"></div><p><strong>ID:</strong> <span id="profileId"></span> <i id="copyIdBtn" class="fas fa-copy" style="cursor:pointer;"></i></p><label>Nome:</label><input type="text" id="profileNickname"><label>Avatar:</label><div id="avatarListProfile"></div><div class="flex-btns"><button id="saveProfileBtn">Salvar</button><button id="closeProfileModal">Fechar</button></div></div></div>
<div id="contactModal" class="modal"><div class="modal-content"><h3>Adicionar Contato</h3><input type="text" id="contactName" placeholder="Nome"><input type="text" id="contactPeerId" placeholder="ID do Peer"><label>Avatar:</label><div id="avatarListContact"></div><div class="flex-btns"><button id="saveContactBtn">Salvar</button><button id="scanQrBtn"><i class="fas fa-camera"></i> Escanear QR</button><button id="closeContactModal">Cancelar</button></div></div></div>
<div id="scannerModal" class="modal"><div class="modal-content"><h3>Escanear QR Code</h3><div id="reader"></div><button id="stopScannerBtn" style="margin-top:16px;">Parar</button></div></div>
<div id="settingsModal" class="modal"><div class="modal-content"><h3>Configurações</h3><p>Status: <span id="connStatus">🔌 Desconectado</span></p><button id="reconnectPeerBtn">Reconectar</button><button id="closeSettingsModal">Fechar</button></div></div>
<div id="searchUserModal" class="modal"><div class="modal-content"><h3>Buscar Usuário</h3><input type="text" id="searchUserName" placeholder="Nome..."><button id="doSearchBtn">Buscar</button><div id="searchResults"></div><button id="closeSearchModal">Fechar</button></div></div>
<div id="loadingToast" class="loading-toast">Processando...</div>
<div id="contextMenu" class="context-menu"></div>

<script>
    // ---------- CONFIGURAÇÃO GLOBAL ----------
    const AVATARS = ["😀","😎","🥳","🐱","🐶","🦊","🐼","👾","🤖","👨‍💻","👩‍🎤","💎","🌟","🍕","⚽"];
    const MAX_IMAGE_SIZE = 640;
    const MAX_FILE_SIZE_MB = 10;
    let currentUser = { id: null, nickname: "AmigoVerde", avatar: "😀" };
    let contacts = [];
    let conversations = [];
    let messages = [];
    let userDirectory = [];
    let currentConversationId = null;
    let peer = null;
    let connections = new Map();
    let pendingMessages = new Map();
    let reconnectAttempts = 0;
    let html5QrCode = null;
    let currentLongPressMsg = null;

    // STORAGE
    function saveAll() {
        localStorage.setItem('p2p_user', JSON.stringify(currentUser));
        localStorage.setItem('p2p_contacts', JSON.stringify(contacts));
        localStorage.setItem('p2p_conversations', JSON.stringify(conversations));
        localStorage.setItem('p2p_messages', JSON.stringify(messages));
        localStorage.setItem('p2p_directory', JSON.stringify(userDirectory));
    }

    function loadAll() {
        let u = localStorage.getItem('p2p_user');
        if (u) currentUser = JSON.parse(u);
        else {
            currentUser.id = crypto.randomUUID ? crypto.randomUUID() : 'peer-' + Date.now() + '-' + Math.random();
            currentUser.nickname = "Viajante" + Math.floor(Math.random() * 100);
            currentUser.avatar = AVATARS[0];
            saveAll();
        }
        contacts = JSON.parse(localStorage.getItem('p2p_contacts') || '[]');
        conversations = JSON.parse(localStorage.getItem('p2p_conversations') || '[]');
        messages = JSON.parse(localStorage.getItem('p2p_messages') || '[]');
        userDirectory = JSON.parse(localStorage.getItem('p2p_directory') || '[]');
        updateDirectoryWithCurrent();
    }

    function updateDirectoryWithCurrent() {
        let idx = userDirectory.findIndex(u => u.id === currentUser.id);
        let entry = { id: currentUser.id, nickname: currentUser.nickname, avatar: currentUser.avatar };
        if (idx >= 0) userDirectory[idx] = entry;
        else userDirectory.push(entry);
        localStorage.setItem('p2p_directory', JSON.stringify(userDirectory));
    }

    function ensureContactExists(peerId) {
        if (contacts.find(c => c.id === peerId)) return;
        let dirEntry = userDirectory.find(u => u.id === peerId);
        let defaultName = dirEntry ? dirEntry.nickname : `Usuário_${peerId.slice(0,6)}`;
        let defaultAvatar = dirEntry ? dirEntry.avatar : "👤";
        contacts.push({ id: peerId, name: defaultName, avatar: defaultAvatar });
        saveAll();
        if (!conversations.find(c => c.contactId === peerId)) {
            conversations.push({ contactId: peerId, displayName: defaultName, lastMessage: '', lastTimestamp: Date.now(), unreadCount: 0 });
            saveAll();
        }
        renderSidebar();
    }

    function createConversation(contactId, displayName) {
        if (!conversations.find(c => c.contactId === contactId)) {
            conversations.push({ contactId, displayName, lastMessage: '', lastTimestamp: Date.now(), unreadCount: 0 });
            saveAll();
        }
        renderSidebar();
    }

    function renderSidebar() {
        let term = document.getElementById('searchConv').value.toLowerCase();
        let filtered = conversations.filter(c => c.displayName.toLowerCase().includes(term));
        let container = document.getElementById('conversationsList');
        if (!container) return;
        container.innerHTML = filtered.map(conv => {
            let contact = contacts.find(c => c.id === conv.contactId);
            let avatar = contact ? contact.avatar : "👤";
            let unread = conv.unreadCount > 0 ? `<span class="unread-badge">${conv.unreadCount}</span>` : '';
            return `<div class="conv-item" data-cid="${conv.contactId}">
                        <div class="conv-avatar">${avatar}</div>
                        <div class="conv-info">
                            <div class="conv-name">${conv.displayName} <span class="conv-time">${new Date(conv.lastTimestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>
                            <div class="conv-last-msg">${conv.lastMessage || 'Nova conversa'}</div>
                        </div>${unread}
                    </div>`;
        }).join('');
        document.querySelectorAll('.conv-item').forEach(el => el.addEventListener('click', () => openConversation(el.dataset.cid)));
    }

    function renderMessages(convId) {
        let msgs = messages.filter(m => m.convId === convId).sort((a,b)=>a.timestamp-b.timestamp);
        let container = document.getElementById('messagesContainer');
        if (!container) return;
        container.innerHTML = msgs.map(msg => {
            let isSent = msg.direction === 'sent';
            let content = '';
            if (msg.type === 'image') content = `<img src="${msg.content}" alt="imagem" onclick="window.open('${msg.content}','_blank')">`;
            else if (msg.type === 'file') content = `<a href="${msg.content}" download style="color:#075e54;">📎 Baixar arquivo</a>`;
            else content = `<div class="msg-content">${escapeHtml(msg.content)} ${msg.edited ? '<small>(editado)</small>' : ''}</div>`;
            return `<div class="message ${isSent ? 'sent' : 'received'}" data-msgid="${msg.id}" data-direction="${msg.direction}" data-type="${msg.type}" data-content="${msg.content.replace(/"/g, '&quot;')}">
                        ${content}
                        <div class="msg-meta">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} ${isSent ? (msg.status === 'read' ? '<i class="fas fa-check-double"></i>' : '<i class="fas fa-check"></i>') : ''}</div>
                    </div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
        attachLongPressMenu();

        // Marcar como lidas
        if (convId) {
            let unread = messages.filter(m => m.convId === convId && m.direction === 'received' && m.status !== 'read');
            unread.forEach(m => { m.status = 'read'; sendViaPeer(convId, { type: 'readReceipt', targetMsgId: m.id }); });
            let conv = conversations.find(c => c.contactId === convId);
            if (conv) conv.unreadCount = 0;
            saveAll();
            renderSidebar();
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    // Long press para mobile (context menu)
    function attachLongPressMenu() {
        let timer;
        const msgs = document.querySelectorAll('.message');
        msgs.forEach(msg => {
            msg.addEventListener('touchstart', (e) => {
                timer = setTimeout(() => {
                    const msgId = msg.dataset.msgid;
                    const direction = msg.dataset.direction;
                    if (direction === 'sent') {
                        showContextMenu(e, msgId);
                    }
                }, 500);
            });
            msg.addEventListener('touchend', () => clearTimeout(timer));
            msg.addEventListener('touchmove', () => clearTimeout(timer));
        });
    }

    function showContextMenu(event, msgId) {
        event.preventDefault();
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `
            <button id="editMsgBtn"><i class="fas fa-edit"></i> Editar</button>
            <button id="deleteMsgBtn"><i class="fas fa-trash-alt"></i> Excluir</button>
        `;
        menu.style.display = 'block';
        menu.style.left = `${event.touches[0].clientX - 80}px`;
        menu.style.top = `${event.touches[0].clientY - 40}px`;
        document.getElementById('editMsgBtn').onclick = () => { editMessage(msgId); menu.style.display = 'none'; };
        document.getElementById('deleteMsgBtn').onclick = () => { deleteMessage(msgId); menu.style.display = 'none'; };
        setTimeout(() => { document.addEventListener('click', () => menu.style.display = 'none', { once: true }); }, 100);
    }

    function editMessage(msgId) {
        let msg = messages.find(m => m.id === msgId);
        if (msg && msg.direction === 'sent') {
            let newContent = prompt("Editar mensagem:", msg.content);
            if (newContent && newContent.trim()) {
                msg.content = newContent.trim();
                msg.edited = true;
                saveAll();
                renderMessages(currentConversationId);
                sendViaPeer(currentConversationId, { type: 'editMsg', msgId: msg.id, newContent: msg.content });
            }
        }
    }

    function deleteMessage(msgId) {
        if (confirm("Excluir esta mensagem?")) {
            let idx = messages.findIndex(m => m.id === msgId);
            if (idx !== -1) {
                messages.splice(idx, 1);
                saveAll();
                renderMessages(currentConversationId);
                sendViaPeer(currentConversationId, { type: 'deleteMsg', msgId: msgId });
            }
        }
    }

    // REDIMENSIONAMENTO DE IMAGEM
    function resizeImage(dataUrl, maxSize = MAX_IMAGE_SIZE) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                let width = img.width, height = img.height;
                if (width > height) { width = maxSize; height = (img.height * maxSize) / img.width; }
                else { height = maxSize; width = (img.width * maxSize) / img.height; }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.onerror = reject;
            img.src = dataUrl;
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('loadingToast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    async function attachFileHandler(file) {
        if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) return alert(`Limite ${MAX_FILE_SIZE_MB}MB`);
        if (file.type.startsWith('image/')) {
            showToast('Redimensionando...');
            const reader = new FileReader();
            reader.onload = async (e) => {
                const resized = await resizeImage(e.target.result);
                sendMessage(resized, 'image');
                showToast('Imagem enviada');
            };
            reader.readAsDataURL(file);
        } else {
            const reader = new FileReader();
            reader.onload = (e) => sendMessage(e.target.result, 'file');
            reader.readAsDataURL(file);
        }
    }

    // PEERJS
    function initPeer() {
        if (peer) peer.destroy();
        peer = new Peer(currentUser.id, { debug: 1, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
        peer.on('open', () => document.getElementById('connStatus').innerHTML = '✅ Conectado');
        peer.on('connection', (conn) => {
            connections.set(conn.peer, conn);
            conn.on('data', (data) => handleIncomingData(conn.peer, data));
            conn.on('close', () => connections.delete(conn.peer));
            flushPending(conn.peer);
        });
        peer.on('error', () => setTimeout(() => initPeer(), 3000 * Math.min(++reconnectAttempts, 5)));
    }

    function ensureConnection(peerId) {
        if (!peer) return;
        if (connections.has(peerId) && connections.get(peerId).open) { updateStatusOnline(true); return; }
        let conn = peer.connect(peerId, { reliable: true });
        conn.on('open', () => { connections.set(peerId, conn); flushPending(peerId); updateStatusOnline(true); });
        conn.on('data', (data) => handleIncomingData(peerId, data));
        conn.on('close', () => { connections.delete(peerId); updateStatusOnline(false); setTimeout(() => ensureConnection(peerId), 3000); });
    }

    function flushPending(peerId) {
        if (pendingMessages.has(peerId)) {
            pendingMessages.get(peerId).forEach(msg => sendViaPeer(peerId, msg));
            pendingMessages.delete(peerId);
        }
    }

    function sendViaPeer(peerId, obj) {
        let conn = connections.get(peerId);
        if (conn && conn.open) { conn.send(obj); return true; }
        else {
            if (!pendingMessages.has(peerId)) pendingMessages.set(peerId, []);
            pendingMessages.get(peerId).push(obj);
            ensureConnection(peerId);
            return false;
        }
    }

    function handleIncomingData(peerId, data) {
        if (data.type === 'textMsg' || data.type === 'imageMsg' || data.type === 'fileMsg') {
            ensureContactExists(peerId);
            let newMsg = { id: crypto.randomUUID(), convId: peerId, type: data.type === 'textMsg' ? 'text' : (data.type === 'imageMsg' ? 'image' : 'file'), content: data.content, timestamp: Date.now(), direction: 'received', status: 'sent', edited: false };
            messages.push(newMsg);
            saveAll();
            let conv = conversations.find(c => c.contactId === peerId);
            if (conv) {
                conv.lastMessage = newMsg.type === 'text' ? newMsg.content.substring(0,35) : (newMsg.type === 'image' ? '📷 Imagem' : '📎 Arquivo');
                conv.lastTimestamp = newMsg.timestamp;
                if (currentConversationId !== peerId) conv.unreadCount = (conv.unreadCount || 0) + 1;
                saveAll();
                renderSidebar();
            }
            if (currentConversationId === peerId) renderMessages(peerId);
            sendViaPeer(peerId, { type: 'readReceipt', targetMsgId: newMsg.id });
        } else if (data.type === 'readReceipt') {
            let target = messages.find(m => m.id === data.targetMsgId);
            if (target && target.direction === 'sent') target.status = 'read';
            saveAll();
            if (currentConversationId === peerId) renderMessages(currentConversationId);
        } else if (data.type === 'editMsg') {
            let msg = messages.find(m => m.id === data.msgId);
            if (msg && msg.direction === 'sent') { msg.content = data.newContent; msg.edited = true; saveAll(); if (currentConversationId === peerId) renderMessages(currentConversationId); }
        } else if (data.type === 'deleteMsg') {
            let idx = messages.findIndex(m => m.id === data.msgId);
            if (idx !== -1) { messages.splice(idx, 1); saveAll(); if (currentConversationId === peerId) renderMessages(currentConversationId); }
        }
    }

    function updateStatusOnline(isOnline) {
        document.getElementById('chatStatus').innerHTML = isOnline ? '<i class="fas fa-circle" style="color:#25d366"></i> Online' : '<i class="fas fa-circle" style="color:#aaa"></i> Offline';
    }

    function sendMessage(content, type = 'text') {
        if (!currentConversationId) return;
        let msgId = crypto.randomUUID();
        let msgObj = { id: msgId, convId: currentConversationId, type, content, timestamp: Date.now(), direction: 'sent', status: 'sent', edited: false };
        messages.push(msgObj);
        saveAll();
        renderMessages(currentConversationId);
        sendViaPeer(currentConversationId, { type: type + 'Msg', content: content, msgId: msgId });
        let conv = conversations.find(c => c.contactId === currentConversationId);
        if (conv) { conv.lastMessage = type === 'text' ? content.substring(0,35) : (type === 'image' ? '📷 Imagem' : '📎 Arquivo'); conv.lastTimestamp = Date.now(); saveAll(); renderSidebar(); }
    }

    function openConversation(contactId) {
        currentConversationId = contactId;
        let contact = contacts.find(c => c.id === contactId);
        let conv = conversations.find(c => c.contactId === contactId);
        if (contact) {
            document.getElementById('chatContactName').innerText = conv ? conv.displayName : contact.name;
            document.getElementById('chatAvatar').innerHTML = contact.avatar;
            document.getElementById('inputArea').style.display = 'flex';
            renderMessages(contactId);
            ensureConnection(contactId);
        } else {
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('chatContactName').innerText = 'Contato inválido';
        }
        if (window.innerWidth <= 700) document.getElementById('sidebar').classList.remove('open');
        renderSidebar();
    }

    // QR SCANNER
    function startQrScanner(onSuccess) {
        const modal = document.getElementById('scannerModal');
        modal.style.display = 'flex';
        const readerDiv = document.getElementById('reader');
        readerDiv.innerHTML = '';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decoded) => {
            html5QrCode.stop();
            modal.style.display = 'none';
            onSuccess(decoded);
        }, () => {});
    }

            if(!name || !pid) return alert('Preencha nome e ID');
            if(!contacts.find(c=>c.id===pid)){
                contacts.push({ id: pid, name, avatar: selected });

                renderSidebar();

                document.getElementById('contactModal').style.display = 'none';

        };

        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'flex';

        document.getElementById('doSearchBtn').onclick = () => {

            document.querySelectorAll('#searchResults div[data-id]').forEach(div => div.onclick = () => {

                document.getElementById('contactModal').style.display = 'flex';

        };
        document.getElementById('closeSearchModal').onclick = () => document.getElementById('searchUserModal').style.display = 'none';

        // Envio mensagens
        document.getElementById('sendTextBtn').onclick = () => {
            let txt = document.getElementById('messageInput').value.trim();
            if(txt) { sendMessage(txt, 'text'); document.getElementById('messageInput').value = ''; }
        };
        document.getElementById('attachFileBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => { if(e.target.files.length) attachFileHandler(e.target.files[0]); e.target.value = ''; };
        document.getElementById('backSidebarBtn').onclick = () => document.getElementById('sidebar').classList.add('open');
        document.getElementById('editConvNameBtn').onclick = () => {
            let conv = conversations.find(c=>c.contactId===currentConversationId);

        document.getElementById('searchConv').addEventListener('input', () => renderSidebar());

        const emojiList = "😀😃😄😁😆😅😂🤣😊😇🙂🙃😉😌😍🥰😘😗😙😚😋😜😝😛🤑🤗🤭🤫🤔🤐🤨😐😑😶😏😒🙄😬🤥😌😔😪🤤😴😷🤒🤕🤢🤮🤧🥵🥶😎🤓🧐😕😟🙁☹️😮😯😲😳🥺😦😧😨😰😥😢😭😱😖😣😞😓😩😫🥱😤😡😠🤬😈👿💀☠️💩🤡👹👺👻👽🤖👍👎👊✊🤛🤜🤞✌️🤟🤘👌🤏👈👉👆👇☝️✋🤚🖐️🖖👋🤙💪🦵🦶👂👃🧠🦷🦴👀👁️👅👄";
        document.getElementById('emojiPicker').innerHTML = emojiList.split('').map(e => `<span>${e}</span>`).join('');
        let emojiPicker = document.getElementById('emojiPicker');
        let emojiBtn = document.getElementById('emojiBtn');
        emojiBtn.onclick = (e) => { e.stopPropagation(); emojiPicker.style.display = emojiPicker.style.display === 'grid' ? 'none' : 'grid'; };
        document.addEventListener('click', () => emojiPicker.style.display = 'none');
        emojiPicker.querySelectorAll('span').forEach(sp => sp.onclick = () => { document.getElementById('messageInput').value += sp.innerText; emojiPicker.style.display = 'none'; });
